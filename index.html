<body>
<div id="wrap">
  <!-- 加载界面 -->
  <div id="loadingOverlay" style="position:absolute;inset:0;background:linear-gradient(135deg,#2a1642 0%,#181030 50%,#421e1e 100%);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <div style="animation:float 2.5s ease-in-out infinite;font-size:clamp(40px,8vw,72px);margin-bottom:12px;">🐱</div>
    <h1 style="font-size:clamp(28px,6vw,46px);font-weight:700;background:linear-gradient(90deg,#ff9a4a,#ffd75a,#7ad7ff,#ff9a4a);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;letter-spacing:2px;margin-bottom:8px;">喵喵突击队</h1>
    <div style="width:min(70%,320px);height:10px;background:rgba(255,255,255,0.12);border-radius:5px;overflow:hidden;margin:18px 0 10px;box-shadow:0 0 20px rgba(255,138,58,0.2);">
      <div id="loadingBar" style="width:0%;height:100%;background:linear-gradient(90deg,#ff8a3a,#ffce5a);transition:width 0.2s ease-out;"></div>
    </div>
    <div id="loadingText" style="color:#ffce5a;font-size:clamp(14px,2.4vw,18px);font-weight:600;letter-spacing:2px;">加载中 0%</div>
    <div style="color:#999;font-size:clamp(10px,1.6vw,12px);margin-top:12px;">首次加载可能需要几秒，请稍候</div>
  </div>
  <canvas id="game" width="960" height="540"></canvas>
  <div id="hud">
    <div><span class="life">生命</span> <span id="life">3</span></div>
    <div><span class="stage">关卡</span> <span id="stage">1</span></div>
    <div><span class="score">得分</span> <span id="score">0</span></div>
  </div>
  <div id="overlay">
    <div class="card">
      <img class="cover-art" id="coverArt" src="assets/cover.jpg?v=3" alt="喵喵突击队封面">
      <div class="logo-wrap">
        <h1>喵喵突击队</h1>
        <h2>守护喵星</h2>
      </div>
      <p class="tagline">击败黑猫坦克与直升机，守护喵星和平！</p>

      <div class="panel panel-compact">
        <div class="panel-title">难度选择</div>
        <div class="difficulty">
          <button class="diff-btn active" data-diff="easy">🟢 简单</button>
          <button class="diff-btn" data-diff="normal">🟡 普通</button>
          <button class="diff-btn" data-diff="hard">🔴 困难</button>
        </div>
      </div>

      <button class="btn btn-secondary" id="helpBtn">📖 操作说明</button>
      <div class="help-backdrop" id="helpBackdrop"></div>
      <div class="help-panel" id="helpPanel">
        <div class="help-header">
          <h3>🎮 操作说明</h3>
          <button class="help-close" id="helpClose" aria-label="关闭">✕</button>
        </div>
        <div class="keys">
          <span><b>A / D</b> 或 <b>← / →</b></span><span>左右移动 / 组合瞄准</span>
          <span><b>空格</b></span><span>跳跃（空中可二段跳）</span>
          <span><b>W / S</b></span><span>瞄准上方 / 下方</span>
          <span><b>WD / WA / SD / SA</b></span><span>45° 斜射</span>
          <span><b>J / 鼠标点击</b></span><span>射击</span>
          <span><b>K</b></span><span>卧倒射击（平台+空格落下）</span>
        </div>
      </div>

      <button class="btn" id="startBtn">开始游戏</button>
      <div class="hint">移动端：左右触控移动，点击射击</div>
    </div>
  </div>
</div>

<!-- 暂停遮罩 -->
<div id="pauseOverlay">
  <div class="pause-card">
    <div class="pause-icon">⏸️</div>
    <h2 class="pause-title">游戏暂停</h2>
    <button class="btn" id="resumeBtn">继续游戏</button>
    <button class="btn btn-secondary" id="pauseRestartBtn">重新开始</button>
  </div>
</div>

<script>
// ============ 喵喵突击队 - 单文件 Canvas 实现 ============
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const lifeEl = document.getElementById('life');
  const scoreEl = document.getElementById('score');
  const stageEl = document.getElementById('stage');
  const coverArt = document.getElementById('coverArt');
  const helpBtn = document.getElementById('helpBtn');
  const helpPanel = document.getElementById('helpPanel');
  const helpBackdrop = document.getElementById('helpBackdrop');
  const helpClose = document.getElementById('helpClose');

  // 封面加载失败时隐藏图片
  coverArt.onerror = () => { coverArt.style.display = 'none'; };

  // 操作说明弹窗控制
  function showHelp(show) {
    helpPanel.classList.toggle('show', show);
    helpBackdrop.classList.toggle('show', show);
    helpBtn.textContent = show ? '📖 收起说明' : '📖 操作说明';
  }
  helpBtn.onclick = () => showHelp(!helpPanel.classList.contains('show'));
  helpClose.onclick = () => showHelp(false);
  helpBackdrop.onclick = () => showHelp(false);

  // ---------- 输入 ----------
  const keys = {};
  const mouse = { x: 0, y: 0, down: false };

  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
    if ((e.key === 'Escape' || e.key.toLowerCase() === 'p') && running && !gameOver && !win) {
      togglePause();
    }
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W / r.width);
    mouse.y = (e.clientY - r.top) * (H / r.height);
  });
  canvas.addEventListener('mousedown', () => { mouse.down = true; });
  window.addEventListener('mouseup', () => { mouse.down = false; });

  // 触摸控制
  let touchLeft = false, touchRight = false, touchJump = false;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    mouse.down = true;
    for (const t of e.changedTouches) {
      const r = canvas.getBoundingClientRect();
      const x = (t.clientX - r.left) * (W / r.width);
      const y = (t.clientY - r.top) * (H / r.height);
      if (x < W * 0.4 && y > H * 0.5) touchLeft = true;
      else if (x > W * 0.6 && y > H * 0.5) touchRight = true;
      else if (y < H * 0.5) touchJump = true;
    }
    updateTouchMouse(e);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    touchLeft = touchRight = touchJump = false;
    for (const t of e.changedTouches) {
      const r = canvas.getBoundingClientRect();
      const x = (t.clientX - r.left) * (W / r.width);
      const y = (t.clientY - r.top) * (H / r.height);
      if (x < W * 0.4 && y > H * 0.5) touchLeft = true;
      else if (x > W * 0.6 && y > H * 0.5) touchRight = true;
      else if (y < H * 0.5) touchJump = true;
    }
    updateTouchMouse(e);
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (e.touches.length === 0) { mouse.down = false; touchLeft = touchRight = touchJump = false; }
  }, { passive: false });
  function updateTouchMouse(e) {
    if (e.touches.length) {
      const r = canvas.getBoundingClientRect();
      const t = e.touches[0];
      mouse.x = (t.clientX - r.left) * (W / r.width);
      mouse.y = (t.clientY - r.top) * (H / r.height);
    }
  }

  // ---------- 工具 ----------
  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const aabb = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;

  // ---------- 资源 ----------
  const assets = {
    bg: new Image(),
    hero: new Image(),
    boss: new Image(),
    skyBg: new Image(),
    heliBoss: new Image(),
    cover: new Image(),
  };
  let assetsReady = false;
  function loadAssets(onProgress, cb) {
    let loaded = 0;
    const total = 6;
    const onLoad = () => {
      loaded++;
      if (onProgress) onProgress(loaded / total);
      if (loaded === total) { assetsReady = true; if (cb) cb(); }
    };
    assets.bg.src = 'assets/cat_bg.jpg?v=3'; assets.bg.onload = onLoad; assets.bg.onerror = onLoad;
    assets.hero.src = 'assets/cat_hero_sheet.png?v=2'; assets.hero.onload = onLoad; assets.hero.onerror = onLoad;
    assets.boss.src = 'assets/cat_boss.png?v=2'; assets.boss.onload = onLoad; assets.boss.onerror = onLoad;
    assets.skyBg.src = 'assets/sky_bg.jpg?v=3'; assets.skyBg.onload = onLoad; assets.skyBg.onerror = onLoad;
    assets.heliBoss.src = 'assets/heli_boss.png?v=1'; assets.heliBoss.onload = onLoad; assets.heliBoss.onerror = onLoad;
    assets.cover.src = 'assets/cover.jpg?v=3'; assets.cover.onload = onLoad; assets.cover.onerror = onLoad;
  }

  // ---------- 世界 ----------
  const GROUND_Y = H - 70;          // 地面顶
  const GRAVITY = 2000;
  const WORLD_LEN = 6400;           // 关卡总长
  let camX = 0;
  let stage = 1;
  let score = 0;
  let gameOver = false;
  let win = false;
  let shake = 0;

  // 平台数据（关卡设计）
  let platforms = [];
  // 敌人配置
  let enemies = [];
  // 子弹
  let bullets = [];     // 玩家
  let ebullets = [];    // 敌人
  // 粒子
  let particles = [];
  // 拾取物
  let pickups = [];

  function buildLevel() {
    platforms = [];
    enemies = [];
    bullets = []; ebullets = []; particles = []; pickups = [];

    if (stage === 1) {
      // ===== 第一关：草地堡垒 =====
      const seg = [
        [0, 1200], [1300, 2400], [2600, 3700], [3900, 5000], [5200, WORLD_LEN]
      ];
      for (const [a, b] of seg) {
        platforms.push({ x: a, y: GROUND_Y, w: b - a, h: 120, type: 'ground' });
      }
      const floats = [
        [600, GROUND_Y - 110, 140], [900, GROUND_Y - 170, 120],
        [1700, GROUND_Y - 120, 160], [2050, GROUND_Y - 200, 130],
        [2900, GROUND_Y - 110, 150], [3200, GROUND_Y - 190, 130],
        [4000, GROUND_Y - 130, 150], [4300, GROUND_Y - 210, 140],
        [5400, GROUND_Y - 120, 160], [5700, GROUND_Y - 200, 140],
      ];
      for (const [x, y, w] of floats) platforms.push({ x, y, w, h: 22, type: 'plat' });

      const infantry = [
        [500, 'patrol', 420, 620], [820, 'patrol', 760, 980],
        [1500, 'stand'], [1850, 'patrol', 1800, 1980], [2150, 'stand'],
        [2750, 'patrol', 2700, 2900], [3050, 'stand'], [3400, 'patrol', 3350, 3550],
        [4050, 'stand'], [4400, 'patrol', 4350, 4550], [4750, 'stand'],
        [5300, 'patrol', 5250, 5450], [5800, 'stand'], [6050, 'stand'],
      ];
      for (const e of infantry) {
        const en = makeEnemy(e[0], GROUND_Y - 40, e[1]);
        if (e[1] === 'patrol') { en.patrolMin = e[2]; en.patrolMax = e[3]; }
        enemies.push(en);
      }
      const snipers = [[920, GROUND_Y - 210], [2100, GROUND_Y - 240], [3300, GROUND_Y - 230], [4350, GROUND_Y - 250], [5750, GROUND_Y - 240]];
      for (const [x, y] of snipers) {
        const en = makeEnemy(x, y, 'sniper');
        enemies.push(en);
      }
      const boss = makeEnemy(WORLD_LEN - 350, GROUND_Y - 90, 'turret');
      boss.w = 70; boss.h = 90; boss.hp = 14; boss.maxhp = 14; boss.fireCD = 1.2;
      enemies.push(boss);

      pickups = [
        { x: 700, y: GROUND_Y - 160, type: 'rapid' },
        { x: 2100, y: GROUND_Y - 240, type: 'spread' },
        { x: 3350, y: GROUND_Y - 230, type: 'rapid' },
        { x: 4400, y: GROUND_Y - 250, type: 'life' },
        { x: 5750, y: GROUND_Y - 240, type: 'spread' },
      ];
    } else {
      // ===== 第二关：天空直升机 =====
      // 起始平台
      platforms.push({ x: 0, y: GROUND_Y, w: 600, h: 120, type: 'ground' });
      // 浮空云岛平台
      const floats = [
        [650, GROUND_Y - 130, 160], [900, GROUND_Y - 210, 140],
        [1200, GROUND_Y - 150, 150], [1550, GROUND_Y - 240, 130],
        [1900, GROUND_Y - 160, 160], [2300, GROUND_Y - 220, 140],
        [2700, GROUND_Y - 140, 150], [3100, GROUND_Y - 200, 140],
        [3500, GROUND_Y - 130, 160], [3950, GROUND_Y - 230, 140],
        [4400, GROUND_Y - 160, 160], [4900, GROUND_Y - 210, 140],
        [5400, GROUND_Y - 140, 160], [5900, GROUND_Y - 200, 140],
        [6300, GROUND_Y - 120, 300],
      ];
      for (const [x, y, w] of floats) platforms.push({ x, y, w, h: 22, type: 'plat' });

      // 空中狙击手
      const snipers = [[1100, GROUND_Y - 250], [2100, GROUND_Y - 270], [3400, GROUND_Y - 260], [4700, GROUND_Y - 280], [5900, GROUND_Y - 270]];
      for (const [x, y] of snipers) {
        const en = makeEnemy(x, y, 'sniper');
        enemies.push(en);
      }
      // 巡逻飞行兵
      const flyers = [[1400, GROUND_Y - 100, 1300, 1600], [2600, GROUND_Y - 90, 2500, 2800], [4200, GROUND_Y - 110, 4100, 4400], [5600, GROUND_Y - 100, 5500, 5800]];
      for (const [x, y, min, max] of flyers) {
        const en = makeEnemy(x, y, 'patrol');
        en.patrolMin = min; en.patrolMax = max;
        en.vx = -60;
        enemies.push(en);
      }

      // 直升机 Boss（空中）
      const heli = makeEnemy(WORLD_LEN - 500, 160, 'helicopter');
      heli.w = 160; heli.h = 90; heli.hp = 30; heli.maxhp = 30; heli.fireCD = 1.0;
      heli.phase = 0; heli.centerX = WORLD_LEN - 500; heli.centerY = 200; heli.radius = 220;
      enemies.push(heli);

      pickups = [
        { x: 1050, y: GROUND_Y - 240, type: 'rapid' },
        { x: 2350, y: GROUND_Y - 250, type: 'life' },
        { x: 3550, y: GROUND_Y - 260, type: 'spread' },
        { x: 5050, y: GROUND_Y - 250, type: 'rapid' },
        { x: 6150, y: GROUND_Y - 180, type: 'life' },
      ];
    }
  }

  function makeEnemy(x, y, type) {
    const base = { x, y, w: 30, h: 40, vx: 0, vy: 0, type, dir: -1, fireCD: rand(0.8, 1.8), hp: 1, maxhp: 1, dead: false, onGround: false, anim: 0 };
    if (type === 'sniper') { base.w = 28; base.h = 38; base.hp = 2; base.maxhp = 2; base.fireCD = rand(1.2, 2.2); }
    if (type === 'turret') { base.hp = 14; base.maxhp = 14; }
    if (type === 'patrol') { base.vx = -40; }
    return base;
  }

  // ---------- 玩家 ----------
  const player = {
    x: 80, y: GROUND_Y - 44, w: 26, h: 44,
    vx: 0, vy: 0, onGround: true, dir: 1,
    life: 5, fireCD: 0, weapon: 'normal', weaponTimer: 0,
    invuln: 0, crouch: false, prone: false, anim: 0, dead: false, respawn: 0, aim: 'side', jumpLock: false, jumpsLeft: 1,
  };

  function resetPlayer(full) {
    player.x = Math.max(80, camX + 120);
    player.y = GROUND_Y - 44;
    player.vx = 0; player.vy = 0;
    player.onGround = true; player.dir = 1;
    player.invuln = 1.6;
    player.crouch = false; player.prone = false;
    player.jumpLock = false; player.jumpsLeft = 1;
    if (full) { player.weapon = 'normal'; player.weaponTimer = 0; }
  }

  // ---------- 射击 ----------
  function playerShoot() {
    if (player.fireCD > 0 || player.dead) return;
    const speed = 720;
    const dir = player.dir;
    const aim = player.aim; // 'side' | 'up' | 'down' | 'diagup' | 'diagdown'
    // 起点 & 弹道方向
    let x = dir > 0 ? player.x + player.w : player.x;
    let y = player.y + (player.prone ? 24 : (player.crouch ? 18 : 18));
    let bvx = dir * speed, bvy = 0;
    if (aim === 'up') { x = player.x + player.w / 2 - 5; y = player.y - 4; bvx = 0; bvy = -speed; }
    else if (aim === 'down') { x = player.x + player.w / 2 - 5; y = player.y + player.h - 4; bvx = 0; bvy = speed; }
    else if (aim === 'diagup') {
      x = dir > 0 ? player.x + player.w : player.x;
      y = player.y + 6;
      bvx = dir * speed * Math.SQRT1_2; bvy = -speed * Math.SQRT1_2;
    }
    else if (aim === 'diagdown') {
      x = dir > 0 ? player.x + player.w : player.x;
      y = player.y + player.h - 6;
      bvx = dir * speed * Math.SQRT1_2; bvy = speed * Math.SQRT1_2;
    }
    const base = { x, y, w: 10, h: 4, vx: bvx, vy: bvy, life: 1.0, owner: 'p' };
    if (player.weapon === 'normal') {
      bullets.push({ ...base });
      player.fireCD = 0.18;
    } else if (player.weapon === 'rapid') {
      bullets.push({ ...base, vx: bvx + rand(-20, 20), vy: bvy + rand(-20, 20) });
      player.fireCD = 0.09;
    } else if (player.weapon === 'spread') {
      // 散射：以瞄准方向为中心扇形扩散
      const ang0 = Math.atan2(bvy, bvx);
      for (let i = -2; i <= 2; i++) {
        const ang = ang0 + i * 0.16;
        bullets.push({ ...base, vx: speed * Math.cos(ang), vy: speed * Math.sin(ang) });
      }
      player.fireCD = 0.28;
    }
    // 枪口火花（沿射击方向）
    const sgnx = bvx === 0 ? 0 : Math.sign(bvx);
    const sgny = bvy === 0 ? 0 : Math.sign(bvy);
    for (let i = 0; i < 4; i++) particles.push({ x: x + 4, y, vx: sgnx * rand(40, 120), vy: sgny * rand(40, 120), life: 0.12, c: '#ffd24a' });
  }

  function enemyShoot(e) {
    const dx = (player.x + player.w / 2) - (e.x + e.w / 2);
    const dy = (player.y + player.h / 2) - (e.y + e.h / 2);
    const d = Math.hypot(dx, dy) || 1;
    const sp = e.type === 'turret' ? 320 : (e.type === 'helicopter' ? 260 : 280);
    let bx = e.dir > 0 ? e.x + e.w : e.x;
    if (e.type === 'turret') { bx = e.x + e.w / 2; }
    if (e.type === 'helicopter') { bx = e.x + e.w / 2; }
    ebullets.push({
      x: bx, y: e.y + e.h * 0.4, w: 8, h: 8,
      vx: dx / d * sp, vy: dy / d * sp, life: 2.5
    });
  }

  // ---------- 更新 ----------
  function update(dt) {
    if (gameOver || win) return;
    if (player.dead) {
      player.respawn -= dt;
      if (player.respawn <= 0) {
        if (player.life <= 0) { endGame(false); return; }
        player.dead = false;
        resetPlayer(true);
      }
      return;
    }

    // 输入移动
    const left = keys['a'] || keys['arrowleft'] || touchLeft;
    const right = keys['d'] || keys['arrowright'] || touchRight;
    const up = keys['w'] || keys['arrowup'];
    const down = keys['s'] || keys['arrowdown'];
    const jumpNow = keys[' '] || touchJump;
    const shootKey = keys['j'] || mouse.down;
    const proneKey = keys['k'];

    // 跳跃按键触发一次
    let jumpPressed = false;
    if (jumpNow && !player.jumpLock) { jumpPressed = true; player.jumpLock = true; }
    if (!jumpNow) player.jumpLock = false;

    // 八方向瞄准：由 W/A/S/D 组合决定射击方向
    // dir(朝向) 取水平移动方向；无水平输入时用上次朝向
    let ax = 0, ay = 0;
    if (left) ax -= 1;
    if (right) ax += 1;
    if (up) ay -= 1;
    if (down) ay += 1;
    // 水平朝向：有水平输入则更新 dir
    if (ax !== 0) player.dir = ax;
    // aim 用方向码表示：side/up/down/diagup/diagdown
    // 优先级：对角 > 纯垂直 > 水平
    let aim = 'side';
    if (ay < 0 && ax !== 0) aim = 'diagup';
    else if (ay > 0 && ax !== 0) aim = 'diagdown';
    else if (ay < 0) aim = 'up';
    else if (ay > 0) aim = 'down';
    player.aim = aim;

    // 蹲下：仅按 S 且无水平移动、站立地面、非卧倒
    player.crouch = down && ax === 0 && player.onGround && !proneKey;
    // 趴下：按住 K 且在地面上；趴下时强制水平瞄准，忽略 W/S
    player.prone = proneKey && player.onGround;
    if (player.prone) player.aim = 'side';

    let move = 0;
    if (!player.prone) {
      if (left) move -= 1;
      if (right) move += 1;
    }
    // 瞄准纯上/下时停止水平移动（保持定点射击手感）
    if (aim === 'up' || aim === 'down') move = 0;

    // 地面/空中可控移动：空中也能变向，跳得更远
    const GROUND_SPEED = 200;
    const AIR_SPEED = 170;
    const targetVx = move * (player.onGround ? GROUND_SPEED : AIR_SPEED);
    const accel = player.onGround ? 1400 : 700;
    if (player.vx < targetVx) player.vx = Math.min(targetVx, player.vx + accel * dt);
    else if (player.vx > targetVx) player.vx = Math.max(targetVx, player.vx - accel * dt);
    if (move !== 0) player.dir = move;

    // 跳跃与二段跳 / 趴下从平台落下
    let onOneWayPlatform = false;
    if (player.onGround) {
      for (const p of platforms) {
        if (p.type !== 'ground' && player.x + player.w > p.x + 4 && player.x < p.x + p.w - 4 && player.y + player.h >= p.y - 2 && player.y + player.h <= p.y + p.h + 16) {
          onOneWayPlatform = true; break;
        }
      }
    }

    if (jumpPressed) {
      if (player.onGround) {
        // 趴在浮空平台上按空格：落下来
        if (proneKey && onOneWayPlatform) {
          player.y += 6;
          player.vy = 0;
          player.onGround = false;
          player.jumpsLeft = 1;
        } else {
          player.vy = -740;
          player.onGround = false;
          player.jumpsLeft = 1;
        }
      } else if (player.jumpsLeft > 0) {
        player.vy = -740;
        player.jumpsLeft--;
      }
    }

    // 重力（稍弱，抛物线更平更远）
    player.vy += 1700 * dt;
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // 平台碰撞
    let wasOnGround = player.onGround;
    player.onGround = false;
    for (const p of platforms) {
      if (p.type === 'ground') {
        if (player.x + player.w > p.x && player.x < p.x + p.w) {
          if (player.y + player.h > p.y && player.y + player.h < p.y + 60 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.onGround = true;
          }
        }
      } else {
        // 单向平台：从上方落下时踩上
        if (player.x + player.w > p.x + 4 && player.x < p.x + p.w - 4) {
          if (player.vy >= 0 && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 14 && !(down && !jumpPressed) && !(proneKey && jumpPressed)) {
            player.y = p.y - player.h; player.vy = 0; player.onGround = true;
          }
        }
      }
    }
    // 落地重置二段跳
    if (player.onGround && !wasOnGround) player.jumpsLeft = 1;

    // 世界边界 & 镜头
    player.x = clamp(player.x, camX + 10, camX + W - 10 - player.w);
    if (player.x > camX + W * 0.45) camX = player.x - W * 0.45;
    camX = clamp(camX, 0, WORLD_LEN - W);

    // 掉落死亡
    if (player.y > H + 80) hitPlayer(true);

    // 射击
    if (shootKey) playerShoot();
    player.fireCD = Math.max(0, player.fireCD - dt);
    if (player.invuln > 0) player.invuln -= dt;
    if (player.weaponTimer > 0) {
      player.weaponTimer -= dt;
      if (player.weaponTimer <= 0) player.weapon = 'normal';
    }
    player.anim += dt;

    // 敌人
    for (const e of enemies) {
      if (e.dead) continue;
      e.anim += dt;
      e.fireCD -= dt;
      // 朝向玩家
      e.dir = (player.x + player.w / 2) < (e.x + e.w / 2) ? -1 : 1;
      // 巡逻 / 飞行
      if (e.type === 'patrol') {
        e.x += e.vx * dt;
        if (e.x < e.patrolMin) { e.x = e.patrolMin; e.vx = Math.abs(e.vx); }
        if (e.x > e.patrolMax) { e.x = e.patrolMax; e.vx = -Math.abs(e.vx); }
      }
      // 直升机 Boss 运动：绕中心盘旋
      if (e.type === 'helicopter') {
        e.phase += dt * 0.8;
        e.x = e.centerX + Math.cos(e.phase) * e.radius;
        e.y = e.centerY + Math.sin(e.phase * 1.3) * 60;
        e.dir = e.vx >= 0 ? 1 : -1;
      }
      // 射击：仅在玩家在镜头内 & 一定距离
      const dxp = (player.x + player.w / 2) - (e.x + e.w / 2);
      const dist = Math.abs(dxp);
      const verticalOK = Math.abs(player.y - e.y) < (e.type === 'helicopter' ? 360 : 220);
      if (e.fireCD <= 0 && dist < 520 && verticalOK) {
        // 只在镜头附近
        if (e.x > camX - 60 && e.x < camX + W + 60) {
          enemyShoot(e);
          e.fireCD = e.type === 'turret' ? rand(0.8, 1.3) : (e.type === 'sniper' ? rand(1.4, 2.4) : (e.type === 'helicopter' ? rand(0.7, 1.2) : rand(1.3, 2.4)));
        }
      }
      // 炮台受击晃动
      if (e.type === 'turret') e.y = GROUND_Y - e.h;
    }

    // 玩家子弹
    for (const b of bullets) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
      // 命中敌人
      for (const e of enemies) {
        if (e.dead) continue;
        if (aabb(b, e)) {
          b.life = 0;
          e.hp -= 1;
          for (let i = 0; i < 6; i++) particles.push({ x: b.x, y: b.y, vx: rand(-120, 120), vy: rand(-120, 60), life: 0.3, c: '#ff7a3a' });
          if (e.hp <= 0) {
            e.dead = true;
            score += e.type === 'turret' ? 1000 : (e.type === 'helicopter' ? 2000 : (e.type === 'sniper' ? 200 : 100));
            if (e.type === 'turret' || e.type === 'helicopter') {
              // Boss 被击败
              if (stage === 1 && e.type === 'turret') {
                // 进入第二关
                stage = 2;
                score += 1000;
                setTimeout(() => startNextStage(), 1500);
              } else {
                win = true;
                endGame(true);
              }
            }
            // 爆炸
            const boomCount = e.type === 'turret' ? 40 : (e.type === 'helicopter' ? 60 : 14);
            for (let i = 0; i < boomCount; i++) {
              particles.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, vx: rand(-200, 200), vy: rand(-260, 60), life: rand(0.4, 0.9), c: i % 2 ? '#ffce5a' : '#ff5a1f' });
            }
            shake = e.type === 'turret' ? 18 : (e.type === 'helicopter' ? 24 : 6);
          } else { shake = 2; }
        }
      }
    }
    bullets = bullets.filter(b => b.life > 0 && b.x > camX - 40 && b.x < camX + W + 40 && b.y > -20 && b.y < H + 20);

    // 敌人子弹
    for (const b of ebullets) {
      b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
      if (!player.dead && player.invuln <= 0 && aabb(b, player)) {
        b.life = 0;
        hitPlayer(false);
      }
    }
    ebullets = ebullets.filter(b => b.life > 0 && b.x > camX - 40 && b.x < camX + W + 40 && b.y > -20 && b.y < H + 40);

    // 敌人接触伤害
    if (player.invuln <= 0 && !player.dead) {
      for (const e of enemies) {
        if (e.dead) continue;
        if (aabb(player, e)) { hitPlayer(false); break; }
      }
    }

    // 拾取物
    for (const p of pickups) {
      if (p.taken) continue;
      const pb = { x: p.x, y: p.y, w: 20, h: 20 };
      if (aabb(player, pb)) {
        p.taken = true;
        if (p.type === 'rapid') { player.weapon = 'rapid'; player.weaponTimer = 12; }
        else if (p.type === 'spread') { player.weapon = 'spread'; player.weaponTimer = 12; }
        else if (p.type === 'life') { player.life = Math.min(5, player.life + 1); }
        score += 50;
        for (let i = 0; i < 12; i++) particles.push({ x: p.x + 10, y: p.y + 10, vx: rand(-100, 100), vy: rand(-120, 20), life: 0.5, c: p.type === 'life' ? '#ff5a5a' : '#5affff' });
      }
    }

    // 粒子
    for (const pa of particles) { pa.x += pa.vx * dt; pa.y += pa.vy * dt; pa.vy += 400 * dt; pa.life -= dt; }
    particles = particles.filter(p => p.life > 0);

    shake = Math.max(0, shake - dt * 30);
    updateHUD();
  }

  function hitPlayer(fall) {
    if (player.invuln > 0 || player.dead) return;
    player.life -= 1;
    for (let i = 0; i < 20; i++) particles.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, vx: rand(-180, 180), vy: rand(-200, 40), life: rand(0.3, 0.7), c: '#ff4a4a' });
    shake = 10;
    if (player.life <= 0 || fall) {
      player.dead = true; player.respawn = 1.2;
      if (player.life <= 0) endGame(false);
      else if (fall) { /* respawn */ }
    } else {
      player.invuln = 1.6;
    }
  }

  // ---------- 渲染 ----------
  function drawSky() {
    const useSky = stage === 2;
    const bgImg = useSky ? assets.skyBg : assets.bg;
    if (assetsReady && bgImg.complete) {
      // 视差滚动背景：比镜头慢 0.3 倍移动，循环铺砖
      const imgW = bgImg.width;
      const imgH = bgImg.height;
      const drawH = H; // 背景图高度铺满
      const drawW = imgW * (drawH / imgH);
      const parallaxX = camX * 0.25;
      const start = -((parallaxX % drawW) + drawW) % drawW;
      for (let x = start; x < W; x += drawW) {
        ctx.drawImage(bgImg, x, 0, drawW, drawH);
      }
      // 暗角覆盖，让背景不抢戏
      ctx.fillStyle = useSky ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.18)';
      ctx.fillRect(0, 0, W, H);
      return;
    }

    // 加载前的回退背景
    const g = ctx.createLinearGradient(0, 0, 0, H);
    if (useSky) {
      g.addColorStop(0, '#3a7ad8');
      g.addColorStop(0.5, '#7ab8ff');
      g.addColorStop(1, '#d8f0ff');
    } else {
      g.addColorStop(0, '#1a0a2a');
      g.addColorStop(0.5, '#3a1020');
      g.addColorStop(1, '#5a1a10');
    }
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // 远山
    ctx.fillStyle = '#2a1530';
    for (let i = 0; i < 6; i++) {
      const mx = (i * 240 - camX * 0.2) % (W + 240);
      ctx.beginPath();
      ctx.moveTo(mx, GROUND_Y);
      ctx.lineTo(mx + 120, GROUND_Y - 160);
      ctx.lineTo(mx + 240, GROUND_Y);
      ctx.fill();
    }
    ctx.fillStyle = '#3a1838';
    for (let i = 0; i < 6; i++) {
      const mx = (i * 200 - camX * 0.35) % (W + 200);
      ctx.beginPath();
      ctx.moveTo(mx, GROUND_Y);
      ctx.lineTo(mx + 100, GROUND_Y - 110);
      ctx.lineTo(mx + 200, GROUND_Y);
      ctx.fill();
    }
    // 月亮
    ctx.fillStyle = 'rgba(255,230,180,0.5)';
    ctx.beginPath(); ctx.arc(W - 130, 90, 38, 0, Math.PI * 2); ctx.fill();
  }

  function drawPlatforms() {
    for (const p of platforms) {
      const sx = p.x - camX;
      if (sx + p.w < 0 || sx > W) continue;
      if (p.type === 'ground') {
        // 土地
        ctx.fillStyle = '#2a1a0e';
        ctx.fillRect(sx, p.y, p.w, p.h);
        // 草层
        ctx.fillStyle = '#1f5a1f';
        ctx.fillRect(sx, p.y, p.w, 8);
        ctx.fillStyle = '#2f7a2f';
        for (let i = 0; i < p.w; i += 14) ctx.fillRect(sx + i, p.y, 8, 4);
        // 纹理点
        ctx.fillStyle = '#3a2516';
        for (let i = 0; i < p.w; i += 22) for (let j = 16; j < p.h; j += 26) ctx.fillRect(sx + i + (j % 2 ? 6 : 0), p.y + j, 5, 4);
      } else {
        ctx.fillStyle = '#5a3a1a';
        ctx.fillRect(sx, p.y, p.w, p.h);
        ctx.fillStyle = '#7a5a2a';
        ctx.fillRect(sx, p.y, p.w, 5);
        ctx.fillStyle = '#3a2510';
        ctx.fillRect(sx, p.y + p.h - 4, p.w, 4);
      }
    }
  }

  function drawPlayer() {
    if (player.dead) return;
    const sx = player.x - camX;
    const sy = player.y;
    if (player.invuln > 0 && Math.floor(player.invuln * 12) % 2 === 0) return;

    // 夺旗猫精灵图：9 帧横向排列，等宽裁剪后
    // 0:idle 1:run1 2:run2 3:jump 4:shoot_h 5:shoot_up 6:crouch 7:prone 8:flag
    if (assetsReady && assets.hero.complete) {
      const frameCount = 9;
      const fw = assets.hero.width / frameCount;
      const fh = assets.hero.height;
      let frame = 0;
      if (player.prone) frame = 7;
      else if (!player.onGround) frame = 3;
      else if (player.crouch) frame = 6;
      else if (player.aim === 'up' || player.aim === 'diagup') frame = 5;
      else if (player.fireCD > 0.12) frame = 4;
      else if (Math.abs(player.vx) > 1) frame = 1 + Math.floor(player.anim * 10) % 2;

      const imgH = 64;
      const imgW = fw * (imgH / fh);
      ctx.save();
      ctx.translate(sx + player.w / 2, sy + player.h);
      if (player.dir < 0) ctx.scale(-1, 1);
      // 启用邻近插值保持像素锐利
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(assets.hero, frame * fw, 0, fw, fh, -imgW / 2, -imgH, imgW, imgH);
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.translate(sx + player.w / 2, sy);
    if (player.dir < 0) ctx.scale(-1, 1);
    const walk = Math.sin(player.anim * 12) * (Math.abs(player.vx) > 1 ? 1 : 0);
    const h = player.prone ? 22 : (player.crouch ? 34 : 44);
    // 腿
    ctx.fillStyle = '#2a4a8a';
    if (player.prone) {
      ctx.fillRect(-12, 12, 24, 8);
    } else if (player.crouch) {
      ctx.fillRect(-8, 24, 7, 10); ctx.fillRect(2, 24, 7, 10);
    } else {
      ctx.fillRect(-7, 30 + walk * 2, 6, 14 - walk * 2);
      ctx.fillRect(2, 30 - walk * 2, 6, 14 + walk * 2);
    }
    // 身体
    ctx.fillStyle = '#c83030';
    if (player.prone) ctx.fillRect(-13, 4, 26, 12);
    else ctx.fillRect(-9, h - 32, 18, 18);
    // 头
    ctx.fillStyle = '#e8b878';
    ctx.fillRect(-7, h - 44, 14, 14);
    // 头巾
    ctx.fillStyle = '#1a8a3a';
    ctx.fillRect(-7, h - 44, 14, 4);
    // 枪（随瞄准方向）
    ctx.fillStyle = '#444';
    if (player.prone) {
      ctx.fillRect(8, 6, 16, 4);
    } else if (player.aim === 'up') {
      // 竖直向上
      ctx.fillRect(-2, h - 52, 4, 22);
    } else if (player.aim === 'down') {
      // 竖直向下
      ctx.fillRect(-2, h - 18, 4, 22);
    } else if (player.aim === 'diagup') {
      // 45 度斜上
      ctx.save();
      ctx.translate(4, h - 26);
      ctx.rotate(-Math.PI / 4);
      ctx.fillRect(0, -2, 22, 4);
      ctx.restore();
    } else if (player.aim === 'diagdown') {
      // 45 度斜下
      ctx.save();
      ctx.translate(4, h - 18);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(0, -2, 22, 4);
      ctx.restore();
    } else {
      ctx.fillRect(6, h - 26, 18, 4);
    }
    ctx.restore();
  }

  function drawEnemy(e) {
    if (e.dead) return;
    const sx = e.x - camX;
    if (sx + e.w < 0 || sx > W) return;
    ctx.save();
    ctx.translate(sx + e.w / 2, e.y);
    if (e.dir < 0) ctx.scale(-1, 1);

    if (e.type === 'turret') {
      if (assetsReady && assets.boss.complete) {
        const imgW = e.w * 3.5;
        const imgH = e.h * 2.6;
        ctx.save();
        // 让图片底部坐在地面上（e.y + e.h）
        ctx.translate(0, e.h - imgH);
        if (e.dir < 0) ctx.scale(-1, 1);
        ctx.drawImage(assets.boss, -imgW / 2, 0, imgW, imgH);
        ctx.restore();
      } else {
        // 回退：方块炮台
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(-35, e.h - 30, 70, 30);
        ctx.fillStyle = '#666';
        ctx.fillRect(-30, e.h - 40, 60, 12);
        ctx.fillStyle = '#888';
        ctx.fillRect(-22, e.h - 70, 44, 32);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(-16, e.h - 78, 32, 12);
        ctx.fillStyle = '#222';
        ctx.fillRect(10, e.h - 60, 34, 10);
      }
      // 血条
      ctx.fillStyle = '#300';
      ctx.fillRect(-30, e.h - 92, 60, 6);
      ctx.fillStyle = '#ff4040';
      ctx.fillRect(-30, e.h - 92, 60 * (e.hp / e.maxhp), 6);
      // 警示灯
      ctx.fillStyle = Math.floor(e.anim * 4) % 2 ? '#ff2020' : '#600';
      ctx.beginPath(); ctx.arc(0, e.h - 74, 4, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'helicopter') {
      if (assetsReady && assets.heliBoss.complete) {
        const imgW = e.w * 5;
        const imgH = e.h * 5.2;
        ctx.save();
        ctx.translate(0, e.h / 2 - imgH / 2);
        if (e.dir < 0) ctx.scale(-1, 1);
        ctx.drawImage(assets.heliBoss, -imgW / 2, 0, imgW, imgH);
        ctx.restore();
      } else {
        // 回退：方块直升机
        ctx.fillStyle = '#4a5a3a';
        ctx.fillRect(-60, 10, 120, 40);
        ctx.fillStyle = '#888';
        ctx.fillRect(-80, 25, 160, 4);
      }
      // 血条
      ctx.fillStyle = '#300';
      ctx.fillRect(-60, -24, 120, 6);
      ctx.fillStyle = '#ff4040';
      ctx.fillRect(-60, -24, 120 * (e.hp / e.maxhp), 6);
      // 螺旋桨动画
      ctx.strokeStyle = 'rgba(200,200,200,0.6)';
      ctx.lineWidth = 3;
      const blade = Math.sin(e.anim * 25) * 60;
      ctx.beginPath();
      ctx.moveTo(-blade, -imgH / 2 + 10);
      ctx.lineTo(blade, -imgH / 2 + 10);
      ctx.stroke();
    } else {
      const bob = Math.sin(e.anim * 8) * 1;
      const catColor = e.type === 'sniper' ? '#8a5a2a' : '#4a4a4a';
      // 猫耳朵
      ctx.fillStyle = catColor;
      ctx.beginPath();
      ctx.moveTo(-8, 2 + bob); ctx.lineTo(-10, -6 + bob); ctx.lineTo(-2, 0 + bob);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(8, 2 + bob); ctx.lineTo(10, -6 + bob); ctx.lineTo(2, 0 + bob);
      ctx.fill();
      // 腿
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-7, 28, 5, 12); ctx.fillRect(2, 28, 5, 12);
      // 身体
      ctx.fillStyle = catColor;
      ctx.fillRect(-9, 14 + bob, 18, 16);
      // 肚皮
      ctx.fillStyle = '#d8b898';
      ctx.fillRect(-5, 20 + bob, 10, 8);
      // 头
      ctx.fillStyle = catColor;
      ctx.fillRect(-8, 2 + bob, 16, 14);
      // 眼睛
      ctx.fillStyle = '#ff4a4a';
      ctx.fillRect(-4, 7 + bob, 2, 2); ctx.fillRect(2, 7 + bob, 2, 2);
      // 枪
      ctx.fillStyle = '#222';
      ctx.fillRect(6, 18 + bob, e.type === 'sniper' ? 22 : 14, 3);
      // 尾巴
      ctx.strokeStyle = catColor; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-9, 22 + bob);
      ctx.quadraticCurveTo(-18, 18 + bob - Math.sin(e.anim * 12) * 4, -16, 8 + bob);
      ctx.stroke();
      // 血条（狙击手）
      if (e.type === 'sniper' && e.hp < e.maxhp) {
        ctx.fillStyle = '#300'; ctx.fillRect(-10, -4, 20, 3);
        ctx.fillStyle = '#ff4040'; ctx.fillRect(-10, -4, 20 * (e.hp / e.maxhp), 3);
      }
    }
    ctx.restore();
  }

  function drawBullets() {
    for (const b of bullets) {
      const ang = Math.atan2(b.vy, b.vx);
      const cx = b.x - camX + b.w / 2;
      const cy = b.y + b.h / 2;
      // 拖尾
      ctx.fillStyle = 'rgba(255,226,74,0.35)';
      ctx.save();
      ctx.translate(cx - b.vx * 0.02, cy - b.vy * 0.02);
      ctx.rotate(ang);
      ctx.fillRect(-b.w, -b.h / 2, b.w, b.h);
      ctx.restore();
      // 弹头
      ctx.fillStyle = '#ffe24a';
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(ang);
      ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
      ctx.restore();
    }
    for (const b of ebullets) {
      const sx = b.x - camX;
      ctx.fillStyle = '#ff4a4a';
      ctx.beginPath(); ctx.arc(sx + 4, b.y + 4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,74,74,0.3)';
      ctx.beginPath(); ctx.arc(sx + 4 - b.vx * 0.012, b.y + 4 - b.vy * 0.012, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawPickups() {
    for (const p of pickups) {
      if (p.taken) continue;
      const sx = p.x - camX;
      if (sx < -20 || sx > W + 20) continue;
      const bob = Math.sin(performance.now() / 300 + p.x) * 3;
      const y = p.y + bob;
      const col = p.type === 'rapid' ? '#5aff8a' : p.type === 'spread' ? '#5affff' : '#ff5a5a';
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(sx, y + 22, 20, 3);
      ctx.fillStyle = col;
      ctx.fillRect(sx + 2, y, 16, 18);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      const t = p.type === 'rapid' ? 'R' : p.type === 'spread' ? 'S' : '+';
      ctx.fillText(t, sx + 10, y + 13);
      ctx.textAlign = 'left';
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = clamp(p.life * 2, 0, 1);
      ctx.fillStyle = p.c;
      ctx.fillRect(p.x - camX - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUDBars() {
    // 武器指示
    if (player.weapon !== 'normal') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(12, H - 34, 140, 22);
      ctx.fillStyle = player.weapon === 'rapid' ? '#5aff8a' : '#5affff';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('WEAPON: ' + player.weapon.toUpperCase(), 18, H - 18);
      ctx.fillStyle = '#fff';
      ctx.fillRect(108, H - 22, 38 * (player.weaponTimer / 12), 6);
    }
  }

  function render() {
    ctx.save();
    if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));
    drawSky();
    drawPlatforms();
    drawPickups();
    for (const e of enemies) drawEnemy(e);
    drawPlayer();
    drawBullets();
    drawParticles();
    drawHUDBars();
    ctx.restore();

    // 进度条
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W / 2 - 100, H - 16, 200, 6);
    ctx.fillStyle = '#ff5a1f';
    ctx.fillRect(W / 2 - 100, H - 16, 200 * clamp((player.x) / WORLD_LEN, 0, 1), 6);
  }

  function updateHUD() {
    lifeEl.textContent = player.life;
    scoreEl.textContent = score;
    stageEl.textContent = stage;
  }

  // ---------- 结束 ----------
  function endGame(victory) {
    gameOver = true;
    win = victory;
    overlay.style.display = 'flex';
    const title = victory ? '任务完成' : '游戏结束';
    const color = victory ? '#5ad7ff' : '#ff4a4a';
    const sub = victory ? '喵喵突击队胜利！' : '英雄已倒下…';
    const desc = victory
      ? '你成功击败了黑猫军团，天空与大地重归和平！'
      : '敌军火力凶猛，再试一次吧！';
    overlay.innerHTML = `
      <div class="card">
        <div class="logo-wrap">
          <div class="cat-icon">${victory ? '🏆' : '😿'}</div>
          <h1 style="font-size:42px;background:linear-gradient(90deg,#ff9a4a,#ffd75a,#7ad7ff,#ff9a4a);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;">${title}</h1>
        </div>
        <h2 style="color:${color};margin-bottom:10px;">${sub}</h2>
        <div class="final" style="font-size:26px;margin:10px 0 18px;">得分: ${score}</div>
        <p class="tagline">${desc}</p>
        <button class="btn" id="restartBtn">${victory ? '再玩一次' : '重新挑战'}</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = () => startGame(difficulty);
  }

  function startNextStage() {
    if (gameOver || win) return;
    camX = 0;
    player.weapon = 'normal'; player.weaponTimer = 0;
    resetPlayer(true);
    buildLevel();
    updateHUD();
    // 显示关卡过渡提示
    const msg = document.createElement('div');
    msg.textContent = '第二关 - 天空直升机';
    msg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#5ad7ff;letter-spacing:4px;text-shadow:0 0 10px #000;pointer-events:none;z-index:10;';
    document.getElementById('wrap').appendChild(msg);
    setTimeout(() => msg.remove(), 2000);
  }

  // ---------- 主循环 ----------
  let last = 0;
  let running = false;
  let paused = false;
  let rafId = null;
  function loop(t) {
    if (!running) return;
    rafId = requestAnimationFrame(loop);
    if (paused) return;
    const dt = Math.min(0.033, (t - last) / 1000 || 0.016);
    last = t;
    update(dt);
    render();
  }

  function togglePause() {
    paused = !paused;
    const pauseOverlay = document.getElementById('pauseOverlay');
    if (paused) {
      pauseOverlay.style.display = 'flex';
    } else {
      pauseOverlay.style.display = 'none';
      last = performance.now();
    }
  }

  let difficulty = 'easy';

  startBtn.onclick = () => startGame(difficulty);

  // 难度选择
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
    };
  });

  // 暂停菜单按钮
  document.getElementById('resumeBtn').onclick = () => togglePause();
  document.getElementById('pauseRestartBtn').onclick = () => startGame(difficulty);

  function startGame(diff) {
    if (rafId) cancelAnimationFrame(rafId);
    running = false;
    paused = false;
    document.getElementById('pauseOverlay').style.display = 'none';
    buildLevel();
    camX = 0; score = 0; stage = 1;
    player.life = diff === 'easy' ? 7 : diff === 'normal' ? 5 : 3;
    player.weapon = 'normal'; player.weaponTimer = 0;
    resetPlayer(true);
    gameOver = false; win = false;
    overlay.style.display = 'none';
    updateHUD();
    running = true;
    last = performance.now();
    rafId = requestAnimationFrame(loop);
  }

  const loadingOverlay = document.getElementById('loadingOverlay');
  const loadingBar = document.getElementById('loadingBar');
  const loadingText = document.getElementById('loadingText');

  // 加载资源，完成后显示开始界面
  startBtn.textContent = '加载中...';
  startBtn.disabled = true;
  loadAssets(
    (progress) => {
      const pct = Math.floor(progress * 100);
      loadingBar.style.width = pct + '%';
      loadingText.textContent = '加载中 ' + pct + '%';
    },
    () => {
      loadingOverlay.style.display = 'none';
      startBtn.textContent = '开始游戏';
      startBtn.disabled = false;
      buildLevel();
      render();
    }
  );

  // 初始渲染一帧背景（资源未加载完成时的占位）
  buildLevel(); render();
})();
</script>
</body>
</html>
